<style>
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
    font-family:Arial, sans-serif;
    display:flex;
    height:100vh;
    overflow:hidden;
    background:#f4f6f8;
    color:#222;
}
/* ---------- Sidebar ---------- */
#sidebar{
    width:340px;
    min-width:340px;
    background:#1f4e79;
    color:#eef3f8;
    display:flex;
    flex-direction:column;
    height:100%;
    transition:margin-left .25s ease;
}
#sidebar .brand{
    padding:18px 18px 12px;
    border-bottom:1px solid rgba(255,255,255,.15);
}
#sidebar .brand h1{
    font-size:18px;
    margin:0 0 2px;
    color:#fff;
}
#sidebar .brand .sub{
    font-size:12px;
    color:#bcd4ea;
}
#filterWrap{padding:12px 14px;}
#filter{
    width:100%;
    padding:8px 10px;
    border:none;
    border-radius:6px;
    font-size:13px;
}
#nav{
    flex:1;
    overflow-y:auto;
    padding:4px 8px 24px;
}
#nav::-webkit-scrollbar{width:9px;}
#nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:6px;}
.group-label{
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:#9fc0de;
    padding:14px 10px 6px;
    font-weight:bold;
}
.chapter{margin:1px 0;}
.chapter-row{
    display:flex;
    align-items:center;
    gap:6px;
    padding:8px 10px;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
    color:#eef3f8;
    user-select:none;
}
.chapter-row:hover{background:rgba(255,255,255,.10);}
.chapter-row.active{background:#c0392b;color:#fff;font-weight:bold;}
.chapter-row .arrow{
    width:14px;
    font-size:10px;
    transition:transform .15s ease;
    flex:0 0 auto;
    opacity:.8;
}
.chapter.open .arrow{transform:rotate(90deg);}
.chapter-row .num{
    font-size:11px;
    background:rgba(255,255,255,.18);
    border-radius:4px;
    padding:1px 5px;
    flex:0 0 auto;
}
.chapter-row.active .num{background:rgba(255,255,255,.30);}
.chapter-row .title{flex:1;}
.sections{
    display:none;
    margin:2px 0 6px 8px;
    border-left:2px solid rgba(255,255,255,.18);
    padding-left:6px;
}
.chapter.open .sections{display:block;}
.sec-link{
    display:block;
    padding:5px 10px;
    font-size:12.5px;
    color:#cfe0f0;
    text-decoration:none;
    border-radius:5px;
    line-height:1.35;
}
.sec-link:hover{background:rgba(255,255,255,.10);color:#fff;}
.sec-link.active{background:rgba(255,255,255,.16);color:#fff;font-weight:bold;}
.no-sec{font-size:12px;color:#9fc0de;padding:4px 10px 8px;font-style:italic;}
/* ---------- Main ---------- */
#main{flex:1;display:flex;flex-direction:column;height:100%;min-width:0;}
#topbar{
    height:48px;
    background:#fff;
    border-bottom:1px solid #dfe5ea;
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 14px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);
}
#hamburger{
    display:none;
    border:none;background:#1f4e79;color:#fff;
    width:34px;height:34px;border-radius:6px;cursor:pointer;font-size:16px;
}
#topTitle{font-weight:bold;color:#1f4e79;font-size:15px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#topbar button.nav,#topbar a.open{
    border:1px solid #cdd6de;background:#f4f6f8;color:#1f4e79;
    padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;text-decoration:none;
}
#topbar button.nav:hover,#topbar a.open:hover{background:#e7edf3;}
#topbar button.nav:disabled{opacity:.4;cursor:default;}
#frame{flex:1;border:none;width:100%;background:#fff;}
/* ---------- Backdrop (mobile only) ---------- */
#backdrop{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    z-index:25;
}
/* ---------- Responsive ---------- */
@media (max-width:820px){
    #hamburger{display:block;}
    #sidebar{
        position:fixed;
        top:0;left:0;bottom:0;
        width:86vw;
        max-width:320px;
        min-width:0;
        transform:translateX(-100%);
        transition:transform .25s ease;
        z-index:30;
        box-shadow:2px 0 16px rgba(0,0,0,.4);
    }
    #sidebar.open{transform:none;}
    #backdrop.show{display:block;}
    #topTitle{font-size:14px;}
    #topbar button.nav,#topbar a.open{padding:6px 9px;font-size:12px;}
}
</style>

        var secs = document.createElement('div');
        secs.className = 'sections';
        if(ch.sections.length === 0){
            var ns = document.createElement('div');
            ns.className = 'no-sec';
            ns.textContent = 'No sub-sections';
            secs.appendChild(ns);
        } else {
            ch.sections.forEach(function(s){
                var a = document.createElement('a');
                a.className = 'sec-link';
                a.href = ch.file + '#' + s.id;
                a.dataset.sec = s.id;
                a.textContent = s.text;
                a.addEventListener('click', function(e){
                    e.preventDefault();
                    openChapter(idx, s.id, false);
                });
                secs.appendChild(a);
            });
        }

        wrap.appendChild(row);
        wrap.appendChild(secs);
        nav.appendChild(wrap);
        chapterEls.push({wrap:wrap, row:row, secs:secs});
    });
})();

function openChapter(idx, sectionId, collapseOthers){
    current = idx;
    var ch = CHAPTERS[idx];
    var url = ch.file + (sectionId ? ('#' + sectionId) : '');
    frame.src = url;

    // active chapter highlight + accordion expand
    chapterEls.forEach(function(el, i){
        var on = (i === idx);
        el.row.classList.toggle('active', on);
        if(on) el.wrap.classList.add('open');
        else if(collapseOthers) el.wrap.classList.remove('open');
        // clear active section markers
        el.secs.querySelectorAll('.sec-link.active').forEach(function(a){a.classList.remove('active');});
    });
    if(sectionId){
        var link = chapterEls[idx].secs.querySelector('[data-sec="'+sectionId+'"]');
        if(link){ link.classList.add('active'); link.scrollIntoView({block:'nearest'}); }
    }

    topTitle.textContent = ch.num + ' · ' + ch.title;
    openTab.href = url;
    prevBtn.disabled = (idx === 0);
    nextBtn.disabled = (idx === CHAPTERS.length - 1);

    var hash = '#' + ch.num + (sectionId ? ('-' + sectionId) : '');
    if(location.hash !== hash){ history.replaceState(null, '', hash); }

    if(window.innerWidth <= 820){ closeSidebar(); }
}

prevBtn.addEventListener('click', function(){ if(current>0) openChapter(current-1, null, true); });
nextBtn.addEventListener('click', function(){ if(current<CHAPTERS.length-1) openChapter(current+1, null, true); });

document.getElementById('hamburger').addEventListener('click', function(){
    if(sidebar.classList.contains('open')) closeSidebar(); else openSidebar();
});
backdrop.addEventListener('click', closeSidebar);

// ---- filter ----
document.getElementById('filter').addEventListener('input', function(){
    var q = this.value.trim().toLowerCase();
    chapterEls.forEach(function(el, i){
        var ch = CHAPTERS[i];
        var inTitle = (ch.num + ' ' + ch.title).toLowerCase().indexOf(q) !== -1;
        var matchSecs = 0;
        el.secs.querySelectorAll('.sec-link').forEach(function(a){
            var hit = a.textContent.toLowerCase().indexOf(q) !== -1;
            a.style.display = (q === '' || inTitle || hit) ? 'block' : 'none';
            if(hit) matchSecs++;
        });
        var show = (q === '' || inTitle || matchSecs > 0);
        el.wrap.style.display = show ? '' : 'none';
        if(q !== '' && matchSecs > 0 && !inTitle){ el.wrap.classList.add('open'); }
    });
    // hide group labels with no visible chapters
    document.querySelectorAll('.group-label').forEach(function(gl){
        var n = gl.nextElementSibling, anyVisible = false;
        while(n && n.classList.contains('chapter')){
            if(n.style.display !== 'none'){ anyVisible = true; break; }
            n = n.nextElementSibling;
        }
        gl.style.display = anyVisible ? '' : 'none';
    });
});

// ---- deep-link via hash (#02 or #02-h5) ----
function openFromHash(){
    var h = location.hash.replace(/^#/, '');
    if(!h) return false;
    var parts = h.split('-');
    var num = parts[0];
    var sec = parts[1] || null;
    for(var i=0;i<CHAPTERS.length;i++){
        if(CHAPTERS[i].num === num){ openChapter(i, sec, true); return true; }
    }
    return false;
}

if(!openFromHash()){ openChapter(0, null, true); }
window.addEventListener('hashchange', openFromHash);
</script>
